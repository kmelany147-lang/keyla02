
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Portafolio Profesional</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: 'Segoe UI', sans-serif;
    }

    body{
        background: linear-gradient(135deg, #1B6B7A, #37DCF2);
        color:#333;
    }

    .container{
        max-width:1000px;
        margin:40px auto;
        background:white;
        border-radius:20px;
        overflow:hidden;
        box-shadow:0 10px 30px rgba(0,0,0,0.2);
    }

    header{
        text-align:center;
        padding:50px;
        color:white;
        background:linear-gradient(135deg,#1B6B7A,#37DCF2);
    }

    header img{
        width:150px;
        height:150px;
        border-radius:50%;
        border:5px solid white;
        margin-bottom:15px;
    }

    header h1{
        font-size:2.5rem;
    }

    header p{
        font-size:1.2rem;
        margin-top:10px;
    }

    section{
        padding:40px;
    }

    h2{
        color:#1B6B7A;
        margin-bottom:15px;
        border-bottom:3px solid #37DCF2;
        display:inline-block;
        padding-bottom:5px;
    }

    .projects{
        display:grid;
        grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
        gap:20px;
        margin-top:20px;
    }

    .card{
        background:#f8f9fa;
        border-radius:15px;
        padding:20px;
        transition:0.3s;
        box-shadow:0 5px 15px rgba(0,0,0,0.1);
    }

    .card:hover{
        transform:translateY(-8px);
    }

    .card h3{
        color:#1B6B7A;
        margin-bottom:10px;
    }
